<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Futbolistas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>⚽ Gestión de Futbolistas</h1>
    <a th:href="@{/futbolistas/nuevo}" class="btn btn-primary">Añadir Jugador</a>
</div>

<table class="table table-striped table-hover shadow">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Equipo</th>
        <th>Posición</th>
        <th>Edad</th>
        <th>Valor (€)</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="f : ${futbolistas}">
        <td th:text="${f.id}"></td>
        <td th:text="${f.nombre}"></td>
        <td th:text="${f.equipo}"></td>
        <td th:text="${f.posicion}"></td>
        <td th:text="${f.edad}"></td>
        <td th:text="${f.valorMercado}"></td>
        <td>
            <a th:href="@{/futbolistas/editar/{id}(id=${f.id})}" class="btn btn-sm btn-warning">Editar</a>
            <a th:href="@{/futbolistas/eliminar/{id}(id=${f.id})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('¿Seguro que quieres eliminar a este crack?')">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
