<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Futbolista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">Registrar Nuevo Crack</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/futbolistas}" th:object="${futbolista}" method="POST">

                    <div class="mb-3">
                        <label class="form-label">Nombre del Jugador:</label>
                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Lamine Yamal" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Equipo:</label>
                        <input type="text" th:field="*{equipo}" class="form-control" placeholder="Ej: FC Barcelona">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Posición:</label>
                        <select th:field="*{posicion}" class="form-control">
                            <option value="Portero">Portero</option>
                            <option value="Defensa">Defensa</option>
                            <option value="Centrocampista">Centrocampista</option>
                            <option value="Delantero">Delantero</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Edad:</label>
                            <input type="number" th:field="*{edad}" class="form-control" min="15" max="50">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Valor (€):</label>
                            <input type="number" step="0.01" th:field="*{valorMercado}" class="form-control">
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Guardar Jugador</button>
                        <a th:href="@{/futbolistas}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
