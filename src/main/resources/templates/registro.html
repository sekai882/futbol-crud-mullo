<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5 text-center" style="max-width: 400px;">
<h2>Crear Cuenta</h2>
<form th:action="@{/registro}" th:object="${usuario}" method="post" class="mt-4">
    <input type="text" th:field="*{username}" class="form-control mb-3" placeholder="Nombre de usuario" required>
    <input type="password" th:field="*{password}" class="form-control mb-3" placeholder="Contraseña" required>
    <button type="submit" class="btn btn-success w-100">Registrarme</button>
</form>
<a th:href="@{/login}" class="d-block mt-3">Volver al login</a>
</body>
</html>
