<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5 text-center" style="max-width: 400px;">
<h2>Iniciar Sesión</h2>
<div th:if="${param.error}" class="alert alert-danger">Usuario o clave incorrectos</div>

<form th:action="@{/login}" method="post" class="mt-4">
    <input type="text" name="username" class="form-control mb-3" placeholder="Usuario" required>
    <input type="password" name="password" class="form-control mb-3" placeholder="Contraseña" required>
    <button type="submit" class="btn btn-primary w-100">Entrar</button>
</form>
<p class="mt-3">¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a></p>
</body>
</html>
