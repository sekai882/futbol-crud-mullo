spring.application.name=futbol-manager-crud

# Configuración de la conexión a SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=FutbolDB;encrypt=true;trustServerCertificate=true;instanceName=SQLEXPRESS
spring.datasource.username=admin1
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Puerto de la aplicación
server.port=8080